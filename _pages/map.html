<h1>핌플레이스 지도</h1>

<p style="color: var(--subtext); font-size: 0.9em;">
  르세라핌 관련 장소 전체를 한 지도에서 보세요.
  지역 → 카테고리 → 세부 카테고리 → 멤버 순으로 필터링할 수 있습니다.
</p>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>
  #map-filters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.6em; margin: 1em 0; align-items: stretch;
  }
  #map-filters select {
    padding: 0.6em 0.8em; border-radius: 6px; border: 1px solid var(--border);
    font-family: inherit; background: var(--input-bg); color: var(--text); width: 100%;
    font-size: 16px; min-height: 44px; box-sizing: border-box;
  }
  #map-filters select:disabled { background: var(--box-bg); color: var(--subtext); }
  #filter-controls {
    display: flex; gap: 0.6em; flex-wrap: wrap; align-items: center; margin-bottom: 0.5em;
  }
  #filter-reset {
    padding: 0.6em 0.9em; border-radius: 6px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text); cursor: pointer; font-family: inherit; font-size: 14px; min-height: 40px;
  }
  #filter-reset:hover { background: var(--link-hover); }
  #result-count { font-size: 0.85em; color: var(--subtext); margin-left: auto; }
  @media (max-width: 600px) {
    #map-filters { grid-template-columns: 1fr 1fr; gap: 0.4em; }
    #map { height: 60vh !important; min-height: 360px !important; }
    #result-count { width: 100%; margin-left: 0; text-align: right; }
  }
  @media (max-width: 380px) {
    #map-filters { grid-template-columns: 1fr; }
  }
  .leaflet-popup-content { margin: 10px 12px !important; font-size: 14px; line-height: 1.5; }
  .leaflet-popup-content a { word-break: break-word; }

  /* 이모지 마커 */
  /* Leaflet div-icon 기본 padding/margin 0 (치우침 원인 1) */
  .leaflet-div-icon.fim-marker-wrap,
  .fim-marker-wrap {
    background: transparent !important; border: 0 !important;
    overflow: visible !important;
    padding: 0 !important; margin: 0 !important;
    display: flex !important; align-items: center; justify-content: center;
    white-space: nowrap;
  }
  .fim-marker {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2.5px solid #222; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.5);
    cursor: pointer; transition: transform 0.1s;
    white-space: nowrap; box-sizing: border-box;
    text-align: center;
    padding: 0;
  }
  .fim-marker:hover { transform: scale(1.15); }
  /* 단일 이모지: span을 1em 정사각형으로 만들고 이모지를 그 안에서 flex 중앙 정렬
     → 이모지 글리프 좌우 advance width 차이를 균일화 */
  .fim-marker span {
    font-size: 18px; line-height: 1;
    width: 1em; height: 1em;
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    text-align: center;
    /* 이모지 컬러 폰트 명시 — 시스템별 일관성 ↑ */
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol",
                 "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .fim-marker.multi {
    width: auto; min-width: 34px; border-radius: 999px;
    padding: 0 8px; height: 34px;
  }
  /* 다중 이모지: 1em 사각형 강제 해제 (이모지들이 가로로 쭉 늘어나야 함) */
  .fim-marker.multi span {
    width: auto;
    display: inline-flex !important;
    letter-spacing: 1px;
  }
  .fim-marker.mono { background: #f5f5f5; border-color: #555; }
  .fim-marker.mono span { font-size: 16px; }

  /* 이모지별 시각 중심 보정 (글리프 비대칭 흡수) */
  .fim-marker[data-member="허윤진"] span { transform: translateX(-1px); }

  /* ---------- 장소 리스트 패널 (D2) ---------- */
  #map-layout { display: flex; gap: 0.8em; align-items: stretch; }
  #map-layout > #map { width: auto !important; flex: 1 1 auto; }
  #map-list {
    flex: 0 0 250px; max-height: 70vh; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 8px; padding: 0 0.3em 0.3em;
    background: var(--bg); -webkit-overflow-scrolling: touch;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #map-list::-webkit-scrollbar { width: 8px; }
  #map-list::-webkit-scrollbar-track { background: transparent; }
  #map-list::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 999px;
    border: 2px solid var(--bg); background-clip: padding-box;
  }
  #map-list::-webkit-scrollbar-thumb:hover { background: var(--subtext); background-clip: padding-box; }
  #map-list-head {
    position: sticky; top: 0; z-index: 1; background: var(--bg);
    padding: 0.5em 0.4em 0.4em; font-size: 0.74em; color: var(--subtext);
    border-bottom: 1px solid var(--border);
  }
  .map-list-item {
    display: flex; align-items: baseline; gap: 0.45em;
    padding: 0.5em 0.4em; border-radius: 6px; cursor: pointer;
    border-bottom: 1px solid var(--border); line-height: 1.35;
  }
  .map-list-item:last-child { border-bottom: 0; }
  .map-list-item:hover { background: var(--link-hover); }
  .map-list-item .mli-emoji { flex: 0 0 auto; font-size: 1em; }
  .map-list-item .mli-title { flex: 1 1 auto; font-size: 0.86em; color: var(--text); word-break: break-word; }
  .map-list-item .mli-sub,
  .map-list-item .mli-date { flex: 0 0 auto; font-size: 0.72em; color: var(--subtext); white-space: nowrap; }
  .map-list-item .mli-date { font-variant-numeric: tabular-nums; }
  #map-list-empty { padding: 1em 0.6em; font-size: 0.85em; color: var(--subtext); text-align: center; }
  @media (max-width: 900px) {
    #map-layout { flex-direction: column; }
    #map-list { flex-basis: auto; max-height: 240px; }
  }
</style>

<div id="map-filters">
  <select id="filter-country" aria-label="국가 필터">
    <option value="">🌏 전체</option>
  </select>
  <select id="filter-region" aria-label="지역 필터">
    <option value="">🗺️ 지역 (전체)</option>
  </select>
  <select id="filter-category" aria-label="카테고리 필터">
    <option value="">🏷️ 카테고리 (전체)</option>
  </select>
  <select id="filter-tag" aria-label="세부 카테고리 필터" disabled>
    <option value="">📂 세부 카테고리 (카테고리 먼저)</option>
  </select>
  <select id="filter-member" aria-label="멤버 필터">
    <option value="">👥 멤버 (전체)</option>
  </select>
</div>

<div id="filter-controls">
  <button id="filter-reset" type="button">필터 초기화</button>
  <label style="display:inline-flex; align-items:center; gap:0.3em; font-size:0.9em; color:var(--subtext); cursor:pointer;">
    <input type="checkbox" id="filter-include-ended" style="width:18px; height:18px;">
    종료된 이벤트도 표시
  </label>
  <span id="result-count"></span>
</div>

<div id="map-layout">
  <div id="map" style="width:100%; height:70vh; min-height:480px; border-radius:8px; border:1px solid var(--border);"></div>
  <aside id="map-list" aria-label="현재 표시 중인 장소 목록"></aside>
</div>

<div id="map-legend" style="display:flex; flex-wrap:wrap; gap:0.7em; margin-top:0.6em; font-size:0.82em; color:var(--subtext);">
  <span>🌸 사쿠라</span> <span>🐯 김채원</span> <span>🐍 허윤진</span>
  <span>🦢 카즈하</span> <span>🐥 홍은채</span> <span>📍 공통</span>
</div>

<p style="font-size:0.8em; color:var(--subtext); margin-top:0.5em;">
  좌표가 있는 장소 수: <strong>{{ site.data.places_count | default: 0 }}</strong>
</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
(function () {
  var mapEl = document.getElementById('map');
  if (!mapEl) return;

  // 좌우 무한 wrap 차단 + 양 끝이 대서양 한가운데(lng=-30 / +330)가 되도록.
  // lng 범위 [-30, 330] 사용 → 한·일(127~138)은 화면 왼쪽 1/3, 태평양이 자연스러운 중앙,
  // 미국(wrap된 235~293)은 화면 오른쪽, 유럽(-8~18)은 화면 왼쪽 끝, 양 끝은 대서양 가운데.
  var WORLD_BOUNDS = L.latLngBounds([-85.0511, -30], [85.0511, 330]);
  // lng 를 -30 ~ +330 범위로 정규화 (대서양 가운데 기준 wrap)
  function wrapLng(lng) {
    if (lng < -30)  return lng + 360;
    if (lng >= 330) return lng - 360;
    return lng;
  }
  var map = L.map('map', {
    maxZoom: 19, minZoom: 2,
    maxBounds: WORLD_BOUNDS,
    maxBoundsViscosity: 1.0,   // 1.0 = 경계 밖으로 끌어도 단단히 막힘
    worldCopyJump: false
  }).setView([36.5, 127.8], 7);

  // noWrap=false (기본): maxBounds 안에서 자동으로 타일이 wrap 되어 lng>180 영역(미국 등)에도 그려짐.
  // 무한 wrap 은 maxBounds + maxBoundsViscosity=1 로 차단.
  var voyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19, maxNativeZoom: 19
  });
  var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
  });
  var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri', maxZoom: 19
  });

  {% assign vkey = site.vworld_api_key | default: '' %}
  {% if vkey != '' %}
  // VWorld Base 레이어 native maxZoom = 19 (WMTSCapabilities 확인). 한국 외엔 회색이지만 wrap 자체는 허용.
  var vworldBase = L.tileLayer('https://api.vworld.kr/req/wmts/1.0.0/{{ vkey }}/Base/{z}/{y}/{x}.png', {
    attribution: '&copy; <a href="https://www.vworld.kr">VWorld</a>', maxZoom: 19, maxNativeZoom: 19
  });
  vworldBase.addTo(map);
  var currentTile = vworldBase;
  L.control.layers({
    '🇰🇷 VWorld 한국': vworldBase,
    '깔끔 (Voyager)': voyager,
    '기본 (OSM)': osm,
    '위성 (Esri)': satellite
  }, null, { position: 'topright', collapsed: true }).addTo(map);
  {% else %}
  voyager.addTo(map);
  var vworldBase = null;
  var currentTile = voyager;
  L.control.layers({
    '깔끔 (Voyager)': voyager,
    '기본 (OSM)': osm,
    '위성 (Esri)': satellite
  }, null, { position: 'topright', collapsed: true }).addTo(map);
  {% endif %}

  // country 변경 시 자동 타일 전환: 한국=VWorld(있을 때), 그 외=Voyager
  function setTileForCountry(country) {
    var next = (country === 'kr' && vworldBase) ? vworldBase : voyager;
    if (currentTile === next) return;
    map.removeLayer(currentTile);
    map.addLayer(next);
    currentTile = next;
  }

  // 국가/그룹별 viewport boundary.
  // 두 가지 용도:
  //   1) 한국 영역 안일 때만 VWorld 타일 자동 swap
  //   2) 선택된 country 의 영역 밖으로 pan 하면 country 셀렉터만 '전체' 로 자동 reset
  var COUNTRY_BOUNDS = {
    // 한국·일본 lng 가 겹치지 않도록 lng=130 을 기준선으로 분리.
    // (서울 127, 부산 129.1, 후쿠오카 130.4, 도쿄 139.6 → 데이터상 안전한 분리)
    kr:    { latMin: 33.0, latMax: 39.5, lngMin: 124.0, lngMax: 130.0 },
    jp:    { latMin: 24.0, latMax: 46.0, lngMin: 130.0, lngMax: 146.0 },
    hk:    { latMin: 22.1, latMax: 22.6, lngMin: 113.8, lngMax: 114.5 },
    mo:    { latMin: 22.0, latMax: 22.3, lngMin: 113.4, lngMax: 113.7 },
    hk_mo: { latMin: 22.0, latMax: 22.6, lngMin: 113.4, lngMax: 114.5 },
    tw:    { latMin: 21.8, latMax: 25.4, lngMin: 119.5, lngMax: 122.1 },
    us:    { latMin: 24.5, latMax: 49.5, lngMin: 235.0, lngMax: 293.5 },
    cn:    { latMin: 18.0, latMax: 53.6, lngMin: 73.5, lngMax: 135.0 },
    th:    { latMin: 5.6,  latMax: 20.5, lngMin: 97.3,  lngMax: 105.6 },
    fr:    { latMin: 41.3, latMax: 51.1, lngMin: -5.2, lngMax: 9.6 },
    it:    { latMin: 35.5, latMax: 47.1, lngMin: 6.6, lngMax: 18.5 },
    gb:    { latMin: 49.8, latMax: 60.9, lngMin: -8.6, lngMax: 1.8 }
  };
  function inBounds(b, c) {
    return c.lat >= b.latMin && c.lat <= b.latMax &&
           c.lng >= b.lngMin && c.lng <= b.lngMax;
  }
  function inKoreaView() {
    if (map.getZoom() < 6) return false;
    return inBounds(COUNTRY_BOUNDS.kr, map.getCenter());
  }

  // map move/zoom 끝날 때마다 viewport 기준 자동 타일 swap.
  // 단, 사용자가 명시적으로 country=jp 선택했거나 레이어 컨트롤로 다른 타일을 골랐을 때는 건드리지 않음.
  function autoSwapTileByViewport() {
    if (!vworldBase) return;  // VWorld 키 없으면 swap 안 함
    if (currentTile !== vworldBase && currentTile !== voyager) return;  // Esri 위성 등 수동 선택 존중
    var cc = countrySel ? countrySel.value : '';
    if (cc && cc !== 'kr') return;  // 일본/홍콩 등 명시적 선택 시 자동 swap 안 함

    var target = inKoreaView() ? vworldBase : voyager;
    if (currentTile === target) return;
    map.removeLayer(currentTile);
    map.addLayer(target);
    currentTile = target;
  }
  map.on('moveend', autoSwapTileByViewport);
  // 사용자가 레이어 컨트롤로 직접 베이스 레이어 바꾸면 currentTile 갱신
  map.on('baselayerchange', function (e) { currentTile = e.layer; });

  // 선택된 country 의 영역 밖으로 pan/zoom 하면 country 셀렉터만 '전체' 로 reset.
  // region/category/tag/member/ended 등 다른 필터는 그대로 유지.
  function autoResetCountryOnExit() {
    var cc = countrySel.value;
    if (!cc) return;                                  // 이미 전체면 할 일 없음
    var b = COUNTRY_BOUNDS[cc];
    if (!b) return;                                   // boundary 정의 없으면 패스
    if (inBounds(b, map.getCenter())) return;         // 아직 영역 안

    countrySel.value = '';
    skipFitBoundsOnce = true;                         // 다른 필터 fitBounds 트리거 방지
    rebuildOptions();
    render();
  }
  map.on('moveend', autoResetCountryOnExit);
  // 뷰포트 이동/줌 시 리스트를 '보이는 장소'로 갱신 (updateList 는 hoisting 됨)
  map.on('moveend', function () { updateList(); });

  var cluster = L.markerClusterGroup();
  map.addLayer(cluster);

  // ─── '내 위치' 컨트롤 (Geolocation) ───
  // 줌 컨트롤 아래에 📍 버튼 추가. 누르면 권한 요청 → 위치 마커 + 정확도 원 표시 + 그 위치로 이동.
  // 두 번째 클릭은 마커를 토글(끄기)한다.
  var locMarker = null, locCircle = null, locWatching = false;
  var locBtn = null;
  // C: 타깃/크로스헤어 SVG (idle = 빈 원, active = 채워진 원)
  var SVG_LOC_IDLE = '<svg viewBox="0 0 24 24" width="20" height="20" style="display:block;margin:5px auto;">' +
    '<circle cx="12" cy="12" r="7" stroke="#333" stroke-width="2.2" fill="none"/>' +
    '<circle cx="12" cy="12" r="2.5" fill="#333"/>' +
    '<line x1="12" y1="2"  x2="12" y2="5"  stroke="#333" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="12" y1="19" x2="12" y2="22" stroke="#333" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="2"  y1="12" x2="5"  y2="12" stroke="#333" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="19" y1="12" x2="22" y2="12" stroke="#333" stroke-width="2.2" stroke-linecap="round"/>' +
    '</svg>';
  var SVG_LOC_ACTIVE = '<svg viewBox="0 0 24 24" width="20" height="20" style="display:block;margin:5px auto;">' +
    '<circle cx="12" cy="12" r="7" stroke="#4285F4" stroke-width="2.2" fill="rgba(66,133,244,0.18)"/>' +
    '<circle cx="12" cy="12" r="2.5" fill="#4285F4"/>' +
    '<line x1="12" y1="2"  x2="12" y2="5"  stroke="#4285F4" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="12" y1="19" x2="12" y2="22" stroke="#4285F4" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="2"  y1="12" x2="5"  y2="12" stroke="#4285F4" stroke-width="2.2" stroke-linecap="round"/>' +
    '<line x1="19" y1="12" x2="22" y2="12" stroke="#4285F4" stroke-width="2.2" stroke-linecap="round"/>' +
    '</svg>';
  function showLocBusy(busy) {
    if (!locBtn) return;
    if (busy) { locBtn.innerHTML = '<span style="display:block;line-height:30px;">⏳</span>'; }
    else { locBtn.innerHTML = locMarker ? SVG_LOC_ACTIVE : SVG_LOC_IDLE; }
    locBtn.style.opacity = busy ? '0.55' : '1';
  }
  L.Control.MyLocation = L.Control.extend({
    options: { position: 'topleft' },
    onAdd: function () {
      var bar = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
      var a = L.DomUtil.create('a', '', bar);
      a.href = '#'; a.title = '내 위치 표시'; a.setAttribute('role', 'button');
      a.style.textAlign = 'center'; a.style.textDecoration = 'none';
      a.innerHTML = SVG_LOC_IDLE;
      locBtn = a;
      L.DomEvent.disableClickPropagation(bar);
      L.DomEvent.on(a, 'click', function (e) {
        L.DomEvent.preventDefault(e);
        if (locMarker) {
          // 토글: 두 번째 클릭 시 마커 끄기
          map.removeLayer(locMarker); map.removeLayer(locCircle);
          locMarker = null; locCircle = null;
          showLocBusy(false);
          return;
        }
        if (!('geolocation' in navigator)) {
          alert('이 브라우저는 위치 기능을 지원하지 않습니다.');
          return;
        }
        showLocBusy(true);
        map.locate({ setView: true, maxZoom: 15, enableHighAccuracy: true, timeout: 10000 });
      });
      return bar;
    }
  });
  (new L.Control.MyLocation()).addTo(map);

  map.on('locationfound', function (e) {
    if (locMarker) { map.removeLayer(locMarker); map.removeLayer(locCircle); }
    var ll = [e.latlng.lat, wrapLng(e.latlng.lng)];
    locMarker = L.marker(ll, {
      icon: L.divIcon({
        className: 'fim-mylocation-wrap',
        html: '<div class="fim-mylocation-pulse"></div><div class="fim-mylocation-dot"></div>',
        iconSize: [22, 22], iconAnchor: [11, 11]
      })
    }).addTo(map).bindPopup('현재 위치 (±' + Math.round(e.accuracy) + 'm)');
    locCircle = L.circle(ll, {
      radius: e.accuracy, color: '#4285F4', weight: 1,
      fillColor: '#4285F4', fillOpacity: 0.12
    }).addTo(map);
    showLocBusy(false);
  });
  map.on('locationerror', function (e) {
    showLocBusy(false);
    var msg = '위치를 가져올 수 없습니다.';
    if (e.code === 1) msg = '위치 권한이 거부되었습니다. 브라우저 주소창의 자물쇠 아이콘에서 권한을 허용해 주세요.';
    else if (e.code === 3) msg = '위치 요청 시간이 초과되었습니다.';
    alert(msg);
  });

  var countrySel  = document.getElementById('filter-country');
  var regionSel   = document.getElementById('filter-region');
  var categorySel = document.getElementById('filter-category');
  var tagSel      = document.getElementById('filter-tag');
  var memberSel   = document.getElementById('filter-member');
  var endedCheck  = document.getElementById('filter-include-ended');
  var resetBtn    = document.getElementById('filter-reset');
  var countEl     = document.getElementById('result-count');

  var ALL = [];
  var currentFiltered = [];   // 현재 필터 통과 장소 (리스트는 이 중 뷰포트에 보이는 것만 표시)
  var CATEGORY_TAGS = {};
  // 이 country 들만 지도에 노출 (빈 배열이면 모두 표시).
  // 향후 노트 검수 끝나면 'tw','fr','it' 등 추가 또는 배열 비우기.
  var VISIBLE_COUNTRIES = ['kr', 'jp', 'hk', 'mo', 'us'];
  var COUNTRY_LABEL = {
    kr: '🇰🇷 한국', jp: '🇯🇵 일본', tw: '🇹🇼 대만',
    us: '🇺🇸 미국', cn: '🇨🇳 중국', th: '🇹🇭 태국',
    hk: '🇭🇰 홍콩', mo: '🇲🇴 마카오',
    fr: '🇫🇷 프랑스', it: '🇮🇹 이탈리아', gb: '🇬🇧 영국'
  };
  // 여러 country 를 셀렉터에서 한 옵션으로 묶기 위한 그룹.
  // members 의 country 들은 그룹 ID 로 합쳐서 카운트·필터·setView 처리됨.
  var COUNTRY_GROUPS = {
    hk_mo: { label: '🇭🇰 홍콩·마카오', members: ['hk', 'mo'] }
  };
  var COUNTRY_TO_GROUP = {};
  Object.keys(COUNTRY_GROUPS).forEach(function (gid) {
    COUNTRY_GROUPS[gid].members.forEach(function (c) { COUNTRY_TO_GROUP[c] = gid; });
  });

  // country 변경 시 지도 중심/줌. '' (전체)는 한국+일본을 함께 보이는 줌.
  var COUNTRY_VIEW = {
    '':    { center: [36.5, 132.0], zoom: 5 },
    kr:    { center: [36.5, 127.8], zoom: 7 },
    jp:    { center: [36.0, 138.0], zoom: 5 },
    tw:    { center: [23.7, 121.0], zoom: 7 },
    us:    { center: [39.0, 262.0], zoom: 4 },
    cn:    { center: [35.0, 105.0], zoom: 4 },
    th:    { center: [13.7, 100.5], zoom: 6 },
    hk:    { center: [22.32, 114.17], zoom: 11 },
    mo:    { center: [22.20, 113.55], zoom: 12 },
    hk_mo: { center: [22.28, 113.95], zoom: 10 },
    fr:    { center: [48.86, 2.35], zoom: 6 },
    it:    { center: [42.0, 12.5], zoom: 6 },
    gb:    { center: [51.5, -0.12], zoom: 6 }
  };
  // 그룹 ID 선택 시 매칭 헬퍼 (render·rebuildOptions 공용)
  function countryMatches(p, cc) {
    if (!cc) return true;
    var group = COUNTRY_GROUPS[cc];
    if (group) return group.members.indexOf(p.country) !== -1;
    return p.country === cc;
  }
  // country 변경 직후엔 render 의 자동 fitBounds 를 한 번 스킵 (setView 의도 보존)
  var skipFitBoundsOnce = false;

  // 종료 판정: places.json 의 ended 필드(서버 계산)를 우선,
  // 없으면 제목의 YYMMDD-YYMMDD 패턴 fallback.
  var TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
  function isEnded(p) {
    // 서버가 '과거 종료'로 확정한 것(true)만 신뢰. false(빌드 시점엔 미래였음)·null(날짜 없음)은
    // 아래에서 제목의 종료일로 '현재 시각' 기준 재평가 → 빌드 이후 끝난 이벤트도 즉시 종료 반영.
    if (p && p.ended === true) return true;
    var title = (p && typeof p === 'object') ? p.title : p;
    if (!title) return false;
    var m = title.match(/(\d{6})[-_~]?(\d{4,6})?(?=[^\d]|$)/);
    if (!m) return false;
    var endStr = m[2] || m[1];
    if (endStr.length === 4) endStr = m[1].substring(0, 2) + endStr;
    var y = parseInt(endStr.substring(0, 2), 10) + 2000;
    var mo = parseInt(endStr.substring(2, 4), 10) - 1;
    var d = parseInt(endStr.substring(4, 6), 10);
    if (mo < 0 || mo > 11 || d < 1 || d > 31) return false;
    return new Date(y, mo, d) < TODAY;
  }

  function uniqueSort(arr) { return Array.from(new Set(arr.filter(Boolean))).sort(); }

  function buildStaticFilters(places) {
    // 1개 국가뿐이면 country 셀렉터 자체를 숨김 (UI 깔끔). 옵션 채우기는 rebuildOptions 가 담당.
    var countries = uniqueSort(places.map(function (p) { return p.country; }));
    if (countries.length <= 1) countrySel.style.display = 'none';
    rebuildOptions();
    // 첫 로드 default: 한국 (있을 때). VWorld 타일 + 한국 중심 view.
    if (countries.indexOf('kr') !== -1) {
      countrySel.value = 'kr';
      setTileForCountry('kr');
      var v = COUNTRY_VIEW['kr'];
      map.setView(v.center, v.zoom);
      skipFitBoundsOnce = true;
      rebuildOptions();
    }
  }

  function applyEnded(arr) {
    if (endedCheck.checked) return arr;
    return arr.filter(function (p) { return !isEnded(p); });
  }

  // 한 select 의 옵션을 카운트와 함께 재구성. count 0 옵션은 제외.
  // currentValue 가 새 옵션에 없으면 빈 값으로 reset.
  function rebuildSelect(sel, items, currentValue, labelFn, firstText) {
    if (firstText !== undefined) sel.options[0].text = firstText;
    while (sel.options.length > 1) sel.remove(1);
    var seen = false;
    items.forEach(function (it) {
      if (!it.count) return;
      sel.add(new Option(labelFn(it.value, it.count), it.value));
      if (it.value === currentValue) seen = true;
    });
    sel.value = seen ? currentValue : '';
  }

  // 상위 필터(country→region→category→tag) 적용 후 풀 단계별로 잘라
  // 각 select 의 유효 옵션 + 카운트를 동적으로 재구성. 0 옵션은 자동 숨김.
  function rebuildOptions() {
    var cc = countrySel.value, r = regionSel.value, c = categorySel.value, t = tagSel.value;

    var basePool     = applyEnded(ALL);
    var afterCountry = basePool.filter(function (p) { return countryMatches(p, cc); });
    var afterRegion  = afterCountry.filter(function (p) { return !r  || p.region  === r;  });
    var afterCategory= afterRegion.filter(function (p) { return !c || (p.categories || []).indexOf(c) !== -1; });
    var afterTag     = afterCategory.filter(function (p) { return !t || (p.tags       || []).indexOf(t) !== -1; });

    // country: 상위 없음 → basePool 기준. 그룹에 속한 country 들은 그룹 ID 로 합산.
    var countryCounts = {};
    basePool.forEach(function (p) {
      var key = COUNTRY_TO_GROUP[p.country] || p.country;
      countryCounts[key] = (countryCounts[key] || 0) + 1;
    });
    var countryItems = Object.keys(countryCounts).sort().map(function (k) { return { value: k, count: countryCounts[k] }; });
    rebuildSelect(countrySel, countryItems, cc,
      function (v, n) {
        var label = (COUNTRY_GROUPS[v] && COUNTRY_GROUPS[v].label) || COUNTRY_LABEL[v] || v.toUpperCase();
        return label + ' (' + n + ')';
      },
      '🌏 전체 (' + basePool.length + ')');

    // region: country 적용 후 풀 (null region 은 옵션에서 제외)
    var regionCounts = {};
    afterCountry.forEach(function (p) { if (p.region) regionCounts[p.region] = (regionCounts[p.region] || 0) + 1; });
    var regionItems = Object.keys(regionCounts).sort().map(function (k) { return { value: k, count: regionCounts[k] }; });
    if (regionItems.length === 0) {
      while (regionSel.options.length > 1) regionSel.remove(1);
      regionSel.options[0].text = '🗺️ 지역 (해당 풀에 없음)';
      regionSel.disabled = true; regionSel.value = '';
    } else {
      regionSel.disabled = false;
      rebuildSelect(regionSel, regionItems, r,
        function (v, n) { return v + ' (' + n + ')'; },
        '🗺️ 지역 전체 (' + afterCountry.length + ')');
    }

    // category: region 적용 후 풀 + CATEGORY_TAGS 키 순서 유지
    var categoryCounts = {};
    afterRegion.forEach(function (p) {
      (p.categories || []).forEach(function (cat) { categoryCounts[cat] = (categoryCounts[cat] || 0) + 1; });
    });
    var categoryItems = Object.keys(CATEGORY_TAGS).map(function (cat) { return { value: cat, count: categoryCounts[cat] || 0 }; });
    rebuildSelect(categorySel, categoryItems, c,
      function (v, n) { return v + ' (' + n + ')'; },
      '🏷️ 카테고리 전체');

    // tag: category 적용 후 풀 + 해당 카테고리의 태그 목록
    if (!c) {
      while (tagSel.options.length > 1) tagSel.remove(1);
      tagSel.options[0].text = '📂 세부 카테고리 (카테고리 먼저)';
      tagSel.disabled = true; tagSel.value = '';
    } else {
      var tagsForCat = CATEGORY_TAGS[c] || [];
      var tagCounts = {};
      afterCategory.forEach(function (p) {
        (p.tags || []).forEach(function (tk) {
          if (tagsForCat.indexOf(tk) !== -1) tagCounts[tk] = (tagCounts[tk] || 0) + 1;
        });
      });
      var tagItems = tagsForCat.map(function (tk) { return { value: tk, count: tagCounts[tk] || 0 }; });
      tagSel.disabled = false;
      rebuildSelect(tagSel, tagItems, t,
        function (v, n) { return '#' + v + ' (' + n + ')'; },
        '📂 ' + c + ' 전체');
    }

    // member: tag 적용 후 풀 (멤버 미기재 노트는 개별 멤버 카운트에 포함하지 않음)
    var memberCounts = {};
    afterTag.forEach(function (p) {
      (p.members || []).forEach(function (mm) { memberCounts[mm] = (memberCounts[mm] || 0) + 1; });
    });
    var memberItems = Object.keys(memberCounts).sort().map(function (k) { return { value: k, count: memberCounts[k] }; });
    rebuildSelect(memberSel, memberItems, memberSel.value,
      function (v, n) { return v + ' (' + n + ')'; },
      '👥 멤버 전체');
  }

  var MEMBER_EMOJI = {
    '사쿠라': '🌸', '김채원': '🐯', '허윤진': '🐍', '카즈하': '🦢', '홍은채': '🐥'
  };
  var MEMBER_BORDER = {
    '사쿠라': '#f0a8cf', '김채원': '#aeb7c2', '허윤진': '#44b5a3',
    '카즈하': '#5f9fd6', '홍은채': '#f4857f'
  };
  var MEMBER_BG = {
    '사쿠라': '#fce4f0', '김채원': '#e6e9ed', '허윤진': '#d5ece6',
    '카즈하': '#dfecf7', '홍은채': '#fde0de'
  };

  function markerIcon(p) {
    var members = p.members || [];
    var html, size, isMulti = members.length > 1;
    if (members.length === 0) {
      html = '<div class="fim-marker mono"><span>📍</span></div>';
      size = [34, 34];
    } else if (isMulti) {
      var emojis = members.map(function (m) { return MEMBER_EMOJI[m] || '·'; }).join('');
      html = '<div class="fim-marker multi" style="background:#fff;border-color:#222;"><span>' + emojis + '</span></div>';
      size = [18 + members.length * 28, 34];
    } else {
      var emoji = MEMBER_EMOJI[members[0]] || '·';
      var bg = MEMBER_BG[members[0]] || '#fff';
      var border = MEMBER_BORDER[members[0]] || '#222';
      html = '<div class="fim-marker" data-member="' + members[0] + '" style="background:' + bg + ';border-color:' + border + ';"><span>' + emoji + '</span></div>';
      size = [34, 34];
    }
    return L.divIcon({
      className: 'fim-marker-wrap', html: html,
      iconSize: size,
      iconAnchor: [Math.round(size[0] / 2), Math.round(size[1] / 2)]
    });
  }

  function popupHtml(p) {
    var tagHtml = (p.tags || []).slice(0, 6).map(function (t) {
      return '<span style="display:inline-block; padding:0.05em 0.4em; margin-right:0.2em; background:var(--box-bg); border-radius:999px; font-size:0.78em;">#' + t + '</span>';
    }).join('');
    var extLinks = [];
    if (p.kakao_url) extLinks.push('<a href="' + p.kakao_url + '" target="_blank" rel="noopener">카카오</a>');
    if (p.naver_url) extLinks.push('<a href="' + p.naver_url + '" target="_blank" rel="noopener">네이버</a>');
    var srcBadge = p.source ? '<span style="font-size:0.7em; color:var(--subtext);">[' + p.source + ']</span>' : '';
    var endedBadge = isEnded(p) ? '<span style="font-size:0.7em; color:#fff; background:#999; padding:0.1em 0.4em; border-radius:999px; margin-left:0.3em;">종료</span>' : '';
    return '<div style="min-width:200px">' +
      '<strong><a href="' + p.url + '">' + p.title + '</a></strong> ' + srcBadge + endedBadge +
      (p.business && p.business !== p.title ? '<div style="font-size:0.8em; color:var(--text); margin-top:0.2em;">' + p.business + '</div>' : '') +
      (p.address ? '<div style="font-size:0.8em; color:var(--subtext); margin-top:0.3em;">📍 ' + p.address + '</div>' : '') +
      (extLinks.length ? '<div style="margin-top:0.3em; font-size:0.8em;">' + extLinks.join(' &middot; ') + '</div>' : '') +
      (tagHtml ? '<div style="margin-top:0.4em">' + tagHtml + '</div>' : '') +
      '</div>';
  }

  function escapeHtmlMap(s) {
    return (s || '').replace(/[&<>"]/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
    });
  }
  function placeEmoji(p) {
    var ms = p.members || [];
    if (ms.length === 0) return '📍';
    if (ms.length === 1) return MEMBER_EMOJI[ms[0]] || '·';
    return ms.map(function (m) { return MEMBER_EMOJI[m] || '·'; }).join('');
  }

  // D1: 현재 필터 상태를 URL 쿼리에 반영 (공유·북마크·새로고침 보존). history 오염 방지 위해 replaceState.
  var listEl = document.getElementById('map-list');
  function updateURL() {
    var p = new URLSearchParams();
    if (countrySel.value)   p.set('country', countrySel.value);
    if (regionSel.value)    p.set('region', regionSel.value);
    if (categorySel.value)  p.set('category', categorySel.value);
    if (tagSel.value)       p.set('tag', tagSel.value);
    if (memberSel.value)    p.set('member', memberSel.value);
    if (endedCheck.checked) p.set('ended', '1');
    var qs = p.toString();
    try { history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '')); } catch (e) {}
  }
  // D1: 로드 시 URL 쿼리 → 필터 복원. 파라미터 없으면 false (기본값 유지).
  function applyURLState() {
    var p = new URLSearchParams(location.search);
    var keys = ['country', 'region', 'category', 'tag', 'member', 'ended'];
    if (!keys.some(function (k) { return p.has(k); })) return false;
    endedCheck.checked = p.get('ended') === '1';
    var cc = p.get('country') || '';
    countrySel.value  = cc;
    regionSel.value   = p.get('region')   || '';
    categorySel.value = p.get('category') || '';
    tagSel.value      = p.get('tag')      || '';
    memberSel.value   = p.get('member')   || '';
    setTileForCountry(cc === 'kr' ? 'kr' : '');
    rebuildOptions();  // 옵션 재구성 + 풀에 없는 선택은 자동으로 ''로 정리
    var v = COUNTRY_VIEW[cc] || COUNTRY_VIEW[''];
    map.setView(v.center, v.zoom);
    skipFitBoundsOnce = true;
    return true;
  }

  // 리스트 패널: currentFiltered 중 '지도 뷰포트에 보이는' 장소만, 최신순으로 갱신.
  function updateList() {
    if (!listEl) return;
    var bounds = null;
    try { bounds = map.getBounds(); } catch (e) {}
    var visible = currentFiltered.filter(function (p) {
      return bounds ? bounds.contains([p.lat, wrapLng(p.lng)]) : true;
    });
    // 최신순: date 내림차순 (date 없으면 뒤로, 동률은 가나다)
    visible.sort(function (a, b) {
      var da = a.date || '', db = b.date || '';
      if (da && db) return da === db ? (a.title || '').localeCompare(b.title || '', 'ko') : (da < db ? 1 : -1);
      if (da) return -1;
      if (db) return 1;
      return (a.title || '').localeCompare(b.title || '', 'ko');
    });
    listEl.innerHTML = '';
    var head = document.createElement('div');
    head.id = 'map-list-head';
    head.textContent = '이 화면 ' + visible.length + '곳'
      + (currentFiltered.length > visible.length ? ' · 전체 ' + currentFiltered.length : '');
    listEl.appendChild(head);
    if (visible.length === 0) {
      var empty = document.createElement('div');
      empty.id = 'map-list-empty';
      empty.textContent = '이 화면에 표시할 장소가 없습니다.';
      listEl.appendChild(empty);
      return;
    }
    visible.forEach(function (p) {
      var row = document.createElement('div');
      row.className = 'map-list-item';
      // 장소 유형 태그(카페/음식점/관광지/팝업스토어…)만 추출 — 섹션명 아님
      var typeTags = CATEGORY_TAGS['장소 유형'] || [];
      var cat = (p.tags || []).filter(function (t) { return typeTags.indexOf(t) !== -1; }).join(' / ');
      var endedTag = isEnded(p) ? ' <span style="color:var(--subtext);font-size:0.85em;">(종료)</span>' : '';
      row.innerHTML =
        '<span class="mli-emoji">' + placeEmoji(p) + '</span>' +
        '<span class="mli-title">' + escapeHtmlMap(p.title) + endedTag + '</span>' +
        (cat ? '<span class="mli-sub">' + escapeHtmlMap(cat) + '</span>' : '');
      row.addEventListener('click', function () {
        var mk = p.__marker;
        if (!mk) return;
        if (cluster.zoomToShowLayer) {
          cluster.zoomToShowLayer(mk, function () { mk.openPopup(); });
        } else {
          map.setView(mk.getLatLng(), Math.max(map.getZoom(), 15));
          mk.openPopup();
        }
        var mapEl2 = document.getElementById('map');
        if (mapEl2 && window.innerWidth <= 900) mapEl2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
      listEl.appendChild(row);
    });
  }

  function render() {
    cluster.clearLayers();
    var cc = countrySel.value;
    var r = regionSel.value;
    var c = categorySel.value;
    var t = tagSel.value;
    var m = memberSel.value;
    var includeEnded = endedCheck.checked;
    var totalEnded = 0;
    var filtered = ALL.filter(function (p) {
      // 종료된 이벤트는 토글 OFF일 때 숨김
      if (isEnded(p)) {
        totalEnded++;
        if (!includeEnded) return false;
      }
      if (!countryMatches(p, cc)) return false;
      if (r && p.region !== r) return false;
      if (c && (!p.categories || p.categories.indexOf(c) === -1)) return false;
      if (t && (!p.tags || p.tags.indexOf(t) === -1)) return false;
      // 멤버 미기재(빈 배열) 노트는 "전체 공통"으로 항상 표시
      if (m && p.members && p.members.length > 0 && p.members.indexOf(m) === -1) return false;
      return true;
    });
    filtered.forEach(function (p) {
      var marker = L.marker([p.lat, wrapLng(p.lng)], { icon: markerIcon(p) }).bindPopup(popupHtml(p));
      cluster.addLayer(marker);
      p.__marker = marker;
    });
    currentFiltered = filtered;

    var msg = filtered.length + ' / ' + ALL.length + ' 장소';
    if (!includeEnded && totalEnded > 0) msg += ' (종료 ' + totalEnded + '개 숨김)';
    countEl.textContent = msg;

    if (filtered.length > 0 && !skipFitBoundsOnce) {
      try {
        var bounds = L.latLngBounds(filtered.map(function (p) { return [p.lat, wrapLng(p.lng)]; }));
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
      } catch (e) {}
    }
    skipFitBoundsOnce = false;
    updateList();
    updateURL();
  }

  countrySel.addEventListener('change', function () {
    var cc = countrySel.value;
    setTileForCountry(cc);
    var v = COUNTRY_VIEW[cc] || COUNTRY_VIEW[''];
    map.setView(v.center, v.zoom);
    skipFitBoundsOnce = true;
    rebuildOptions();
    render();
  });
  regionSel.addEventListener('change',   function () { rebuildOptions(); render(); });
  categorySel.addEventListener('change', function () { rebuildOptions(); render(); });
  tagSel.addEventListener('change',      function () { rebuildOptions(); render(); });
  endedCheck.addEventListener('change',  function () { rebuildOptions(); render(); });
  memberSel.addEventListener('change', render);
  resetBtn.addEventListener('click', function () {
    countrySel.value = '';
    regionSel.value = ''; categorySel.value = ''; memberSel.value = '';
    endedCheck.checked = false;
    setTileForCountry('');
    var v = COUNTRY_VIEW[''];
    map.setView(v.center, v.zoom);
    skipFitBoundsOnce = true;
    rebuildOptions();
    render();
  });

  fetch('{{ site.baseurl }}/places.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var raw = (data && data.places) || [];
      ALL = VISIBLE_COUNTRIES.length
        ? raw.filter(function (p) { return VISIBLE_COUNTRIES.indexOf(p.country) !== -1; })
        : raw;
      CATEGORY_TAGS = (data && data.category_tags) || {};
      buildStaticFilters(ALL);
      applyURLState();   // URL 쿼리 있으면 기본값(한국) 대신 복원
      render();
      // 리스트 패널(flex) 레이아웃 확정 후 지도 크기 재계산 (사이드패널로 인한 너비 변화 대응)
      setTimeout(function () { try { map.invalidateSize(); } catch (e) {} }, 200);
    })
    .catch(function () {
      countEl.textContent = '지도 데이터를 불러올 수 없습니다.';
    });
})();
</script>
