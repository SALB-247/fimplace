<div class="giscus" style="margin-top: 2em;"></div>
<script>
(function () {
  // 초기 giscus 테마를 현재 사이트 테마(라이트/다크)와 일치시킴. 토글 시엔 nav.html 이 postMessage 로 동기화.
  var theme = document.documentElement.getAttribute('data-theme')
    || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  var s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  var attrs = {
    'data-repo': 'SALB-247/fimplace',
    'data-repo-id': 'R_kgDOOC4skg',
    'data-category': 'General',
    'data-category-id': 'DIC_kwDOOC4sks4C9WQm',
    'data-mapping': 'title',
    'data-strict': '0',
    'data-reactions-enabled': '1',
    'data-emit-metadata': '0',
    'data-input-position': 'top',
    'data-theme': theme,
    'data-lang': 'ko',
    'data-loading': 'lazy'
  };
  Object.keys(attrs).forEach(function (k) { s.setAttribute(k, attrs[k]); });
  s.crossOrigin = 'anonymous';
  s.async = true;
  document.currentScript.parentNode.appendChild(s);
})();
</script>
